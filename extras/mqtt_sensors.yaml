    # ── Jetson Orin Nano Metrics ──
    - name: "Jetson CPU Usage"
      state_topic: "engineered_lighting/jetson/metrics"
      value_template: "{{ value_json.cpu_usage }}"
      json_attributes_topic: "engineered_lighting/jetson/metrics"
      json_attributes_template: "{{ value_json | tojson }}"
      unit_of_measurement: "%"
      icon: mdi:chip
